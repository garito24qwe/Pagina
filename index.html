<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abril - Un ramo de rosas 3D para ti 🌹</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Canvas para Three.js -->
    <canvas id="canvas3d"></canvas>

    <!-- Contenido UI -->
    <div class="ui-container">
        <!-- Encabezado -->
        <header>
            <h1 class="title">Abril 💕</h1>
            <p class="subtitle">Para ti, con todo mi amor</p>
        </header>

        <!-- Mensaje especial -->
        <div class="message-box">
            <p class="message-text">
                Este ramo de rosas representa todo lo que sientes para mí. 
                Cada pétalo es un momento especial juntos. 
                ¡Te amo más que nunca, Abril! 💗
            </p>
        </div>

        <!-- Botones decorativos -->
        <div class="buttons">
            <button class="btn btn-love" id="btnLove">❤️ Te amo</button>
            <button class="btn btn-surprise" id="btnSurprise">✨ Sorpresa</button>
            <button class="btn btn-rotate" id="btnRotate">🔄 Girar</button>
        </div>

        <!-- Instrucciones -->
        <div class="instructions">
            <p>💡 Haz clic y arrastra para girar el ramo • Usa la rueda para acercar/alejar</p>
        </div>

        <!-- Pie de página -->
        <footer>
            <p>Hecho con 💜 para Abril</p>
        </footer>
    </div>

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
